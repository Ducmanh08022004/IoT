spring.application.name=iot

spring.datasource.url=jdbc:mysql://localhost:3306/iot
spring.datasource.username=root
spring.datasource.password=08022004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:init.sql

# Light conversion formula (ADCmax fixed at 4095): lux = K * [R * (ADCmax/ADC - 1)]^(-gamma)
iot.light.adc-max=4095
iot.light.vref=3.3
iot.light.k=12518931
iot.light.r=10000
iot.light.gamma=1.405
iot.light.max-lux=100000